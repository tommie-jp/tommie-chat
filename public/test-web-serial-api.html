<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>シリアルテスト</title>
<style>
  /* Windows 11 Chrome + Babylon canvas の水色ゴーストスクロールバー対策。
     デフォルトスクロールバーは GPU コンポジタで独立レイヤー化されると親ウィンドウの
     Babylon canvas に #87ceeb の縦バーが焼き付く。カスタム ::-webkit-scrollbar を
     定義するとレイヤー扱いが変わり発症しない。 */
  html::-webkit-scrollbar,
  body::-webkit-scrollbar { width: 8px; height: 8px; }
  html::-webkit-scrollbar-track,
  body::-webkit-scrollbar-track { background: rgba(255,255,255,0.95); }
  html::-webkit-scrollbar-thumb,
  body::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.25); border-radius: 4px; }
  html::-webkit-scrollbar-thumb:hover,
  body::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.4); }
  body { font-family: sans-serif; font-size: 14px; padding: 1em; max-width: 1000px; margin: 0 auto; }
  h1 { font-size: 1.5em; margin: 0 0 0.5em 0; }
  button { font-family: inherit; font-size: 1em; padding: 0.3em 0.8em; margin: 0.15em; cursor: pointer; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  select, input { font-family: inherit; font-size: 1em; padding: 0.2em; }
  /* index.html 側のパネルと同じ自作スクロールバー方式で統一（JS 共通化のため）。
     単体ページではゴースト問題はないが、構造を揃えておくことで test-web-serial-api.js を分岐なく使える。 */
  .log-wrap {
    position: relative;
    width: 100%;
    margin: 0;
  }
  .log-wrap-main { height: 40vh; }
  .log-wrap-console { height: 20vh; }
  #log, #console-log {
    width: 100%;
    height: 100%;
    box-sizing: border-box;
    border: 1px solid #444;
    padding: 0.5em;
    padding-right: calc(0.5em + 10px);
    margin: 0;
    font-family: monospace;
    font-size: 14px;
    line-height: 1.5;
    overflow: hidden;
    white-space: pre-wrap;
    word-break: break-all;
  }
  #log { background: #111; color: #cfc; }
  #console-log { background: #1a1a1a; color: #ffc; }
  .fake-sb {
    position: absolute; top: 2px; right: 2px; bottom: 2px; width: 8px;
    background: rgba(255,255,255,0.05); border-radius: 4px;
  }
  .fake-sb-thumb {
    position: absolute; left: 0; top: 0; width: 100%; height: 20px;
    background: rgba(255,255,255,0.3); border-radius: 4px; cursor: grab; touch-action: none;
  }
  .fake-sb-thumb:hover { background: rgba(255,255,255,0.5); }
  .fake-sb-thumb.dragging { background: rgba(255,255,255,0.6); cursor: grabbing; }
  .section-label { font-size: 1em; color: #555; margin-top: 0.4em; margin-bottom: 0.1em; display: flex; justify-content: space-between; align-items: center; }
  .section-label button { font-size: 0.9em; padding: 0.1em 0.5em; }
  .row { margin: 0.3em 0; }
  .status { font-weight: bold; }
  .status.connected { color: #2a7; }
  .status.disconnected { color: #888; }
  .status.error { color: #c33; }
  .stats { font-size: 0.9em; color: #666; margin-left: 1em; }
  fieldset { border: 1px solid #ccc; padding: 0.4em 0.8em; margin: 0.4em 0; }
  legend { padding: 0 0.3em; color: #555; }
  label { margin-right: 1em; }
</style>
</head>
<body>
<h1>シリアルテスト</h1>

<fieldset>
  <legend>接続</legend>
  <div class="row">
    API:
    <select id="api">
      <option value="auto" selected>自動</option>
      <option value="native">Native (navigator.serial)</option>
      <option value="polyfill">Polyfill (WebUSB)</option>
    </select>
    Baud:
    <select id="baud">
      <option value="300">300</option>
      <option value="1200">1,200</option>
      <option value="9600">9,600</option>
      <option value="38400">38,400</option>
      <option value="115200" selected>115,200</option>
      <option value="230400">230,400</option>
      <option value="460800">460,800</option>
      <option value="921600">921,600</option>
    </select>
    <button id="connect">新接続</button>
    <button id="reconnect">再接続</button>
    <button id="disconnect" disabled>接続を切る</button>
  </div>
  <div class="row">
    状態: <span id="status" class="status disconnected">未接続</span>
    <span class="stats" id="stats"></span>
  </div>
</fieldset>

<fieldset>
  <legend>表示オプション</legend>
  <div class="row">
    <label><input type="checkbox" id="opt-line-buffer" checked> 行バッファリング（改行で確定）</label>
    <label><input type="checkbox" id="opt-line-number" checked> 行番号</label>
    <label>タイムスタンプ:
      <select id="opt-timestamp">
        <option value="none">なし</option>
        <option value="clock" selected>時刻</option>
        <option value="relative">相対時間</option>
      </select>
    </label>
    <label>Hex:
      <select id="opt-hex">
        <option value="none">なし</option>
        <option value="hex">Hex</option>
        <option value="hex-ascii">Hex+ASCII</option>
        <option value="hex-ascii-offset">Hex+ASCII+オフセット</option>
        <option value="replay" selected>Replay (TX/RX)</option>
      </select>
    </label>
    <label><input type="checkbox" id="opt-autoscroll" checked> スクロール</label>
    <label>行間:
      <select id="opt-line-gap">
        <option value="1">0</option>
        <option value="1.25">1/4</option>
        <option value="1.5" selected>1/2</option>
      </select>
    </label>
  </div>
</fieldset>

<div class="section-label">
  <span>シリアル出力</span>
  <span>
    <button id="copy-log">Copy</button>
    <button id="clear">Clear</button>
  </span>
</div>
<div class="log-wrap log-wrap-main">
  <pre id="log"></pre>
  <div class="fake-sb" data-target="log"><div class="fake-sb-thumb"></div></div>
</div>

<div class="row">
  <input id="send-text" placeholder="送信文字列" style="width: 60%;">
  改行:
  <select id="send-eol">
    <option value="crlf">CRLF</option>
    <option value="lf">LF</option>
    <option value="cr">CR</option>
    <option value="none">なし</option>
  </select>
  <button id="send" disabled>送信</button>
</div>

<div class="section-label">
  <span>コンソールログ</span>
  <span>
    <button id="copy-console">Copy</button>
    <button id="clear-console">Clear</button>
  </span>
</div>
<div class="log-wrap log-wrap-console">
  <pre id="console-log"></pre>
  <div class="fake-sb" data-target="console-log"><div class="fake-sb-thumb"></div></div>
</div>

<script type="module" src="/js/test-web-serial-api.js"></script>
</body>
</html>
