name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - name: Shell script syntax check
        run: |
          failed=0
          for f in $(find . -name '*.sh' -not -path '*/node_modules/*'); do
            if ! bash -n "$f"; then
              echo "❌ $f"
              failed=1
            fi
          done
          exit $failed
      - name: Upload dist
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
