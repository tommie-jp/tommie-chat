# tommieChat サーバー docker-compose設定
#
# Copyright 2026 tommieChat. All rights reserved.
#
# サービス構成:
#   postgres   - データベース (ユーザ・マッチ等の永続化)
#   nakama     - ゲームサーバ (マッチ・WebSocket・RPC)
#   web        - Nginx (フロントエンド静的ファイル配信)
#   prometheus - メトリクス収集・監視
#   minio      - アセットストレージ (S3互換)
#
# 起動:   docker compose up -d
# 停止:   docker compose down
# 再起動: docker compose restart nakama
# ログ:   docker compose logs -f nakama
# 状態:   docker compose ps
services:
  # --- PostgreSQL データベース ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: nakama
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev}
    restart: "no"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data # DB永続化（Bind mount）
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nakama -d nakama"]
      interval: 3s
      timeout: 3s
      retries: 10

  # --- Nakama ゲームサーバ ---
  nakama:
    image: registry.heroiclabs.com/heroiclabs/nakama:3.35.0
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - |
          /nakama/nakama migrate up \
            --database.address \
            nakama:${POSTGRES_PASSWORD:-localdev}@postgres:5432/nakama \
          && exec /nakama/nakama \
            --name nakama1 \
            --database.address \
            nakama:${POSTGRES_PASSWORD:-localdev}@postgres:5432/nakama \
            --logger.level DEBUG \
            --session.token_expiry_sec 7200 `# セッション有効期限[秒](default3600)` \
            --socket.ping_period_ms 10000 `# WebSocket ping間隔[ms](default15000)` \
            --socket.pong_wait_ms 15000 `# pong応答待ち[ms](default25000)` \
            --socket.write_wait_ms 5000 `# 書込み待ち[ms](default10000)` \
            --shutdown_grace_sec 5 `# シャットダウン猶予[秒](default0)` \
            --metrics.prometheus_port 9100 `# Prometheusポート[番号]` \
            --runtime.env NAKAMA_VERSION=3.35.0 \
            --match.input_queue_size 8192 `# tick毎メッセージキュー[件](default128)` \
            --socket.outgoing_queue_size 2048 `# 接続毎送信バッファ[件](default64)` \
            --socket.max_request_size_bytes 131072 `# 受信メッセージ上限[bytes](default131072)` \
            --runtime.max_count 8192 `# RPC同時goroutine上限[個](default256)` \
            --match.max_empty_sec 30 `# 空マッチ自動削除[秒](default0)` \
            --runtime.env MAX_LOGIN_RATE_PER_SEC=50 `# ログイン制限[人/秒]` \
            --runtime.env MAX_CHAT_LEN=200 `# チャット文字数上限` \
            --runtime.env RATE_LIMIT_CHAT=5 `# チャット制限[回/秒]` \
            --runtime.env RATE_LIMIT_BLOCK=20 `# ブロック設置制限[回/秒]` \
            --runtime.env RATE_LIMIT_MOVE=30 `# 移動制限[回/秒]` \
            --runtime.env MAX_BLOCK_ID=255 `# 有効ブロックID上限` \
            --runtime.env RATE_LIMIT_RPC=10 `# RPC制限[回/秒/ユーザー]` \
            --runtime.env RATE_LIMIT_RPC_BURST=20 `# RPCバースト上限[回]` \
            --runtime.env MAX_DISPLAY_NAME_LEN=30 `# 表示名文字数上限` \
            --runtime.env MAX_TEXTURE_URL_LEN=128 `# テクスチャURL長上限[bytes]` \
            --runtime.env MAX_ARRAY_SIZE=100 `# 配列リクエスト要素数上限` \
            --runtime.env ENABLE_TEST_RPC=true `# dev専用: テスト用RPC有効（本番はprod.ymlでfalse）` \
            --runtime.env MINIO_ENDPOINT=minio:9000 `# MinIO S3 API` \
            --runtime.env MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin} \
            --runtime.env MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin} \
            --runtime.env MINIO_USE_SSL=false \
            --socket.server_key tommie-chat
    restart: "no"
    stop_grace_period: 10s # SIGTERM後の猶予時間
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./:/nakama/data # Go plugin(.so)とLuaモジュール
    expose:
      - "6060" # pprof
      - "7349" # gRPC API
      - "7350" # HTTP API / WebSocket
      - "7351" # Console(管理画面)
      - "9100" # Prometheus metrics
    healthcheck:
      test: ["CMD", "/nakama/nakama", "healthcheck"]
      interval: 3s
      timeout: 5s
      retries: 5

  # --- Web フロントエンド配信 ---
  # 開発時: Vite devサーバー (host.docker.internal:3000) へリバースプロキシ
  web:
    image: nginx:alpine
    restart: "no"
    depends_on:
      nakama:
        condition: service_healthy
      minio:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../dist:/usr/share/nginx/html:ro # ビルド済み静的ファイル
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  # --- Prometheus メトリクス収集 ---
  prometheus:
    image: prom/prometheus
    entrypoint: /bin/sh -c
    command: |
      'sh -s <<EOF
        cat > ./prometheus.yml <<EON
      global:
        scrape_interval:     15s
        evaluation_interval: 15s

      scrape_configs:
        - job_name: prometheus
          static_configs:
          - targets: ['localhost:9090']

        - job_name: nakama
          metrics_path: /
          static_configs:
          - targets: ['nakama:9100']
      EON
      prometheus --config.file=./prometheus.yml
      EOF'

  # --- MinIO アセットストレージ (S3互換) ---
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    restart: "no"
    volumes:
      - ./data/minio:/data # MinIO永続化（Bind mount）
    expose:
      - "9000"  # S3 API
      - "9001"  # Web管理コンソール
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

# volumes は Bind mount（./data/）を使用するため定義不要
