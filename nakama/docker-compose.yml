# tommChat サーバー docker-compose設定
#
# Copyright 2026 tommChat. All rights reserved.
#
# サービス構成:
#   postgres   - データベース (ユーザ・マッチ等の永続化)
#   nakama     - ゲームサーバ (マッチ・WebSocket・RPC)
#   web        - Nginx (フロントエンド静的ファイル配信)
#   prometheus - メトリクス収集・監視
#
# 起動:   docker compose up -d
# 停止:   docker compose down
# 再起動: docker compose restart nakama
# ログ:   docker compose logs -f nakama
# 状態:   docker compose ps
services:
  # --- PostgreSQL データベース ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: nakama
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev}
    restart: "no"
    volumes:
      - data:/var/lib/postgresql/data # DB永続化
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nakama -d nakama"]
      interval: 3s
      timeout: 3s
      retries: 10

  # --- Nakama ゲームサーバ ---
  nakama:
    image: registry.heroiclabs.com/heroiclabs/nakama:3.35.0
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - |
          /nakama/nakama migrate up \
            --database.address \
            nakama:${POSTGRES_PASSWORD:-localdev}@postgres:5432/nakama \
          && exec /nakama/nakama \
            --name nakama1 \
            --database.address \
            nakama:${POSTGRES_PASSWORD:-localdev}@postgres:5432/nakama \
            --logger.level DEBUG \
            --session.token_expiry_sec 7200 `# セッション有効期限[秒](default3600)` \
            --socket.ping_period_ms 10000 `# WebSocket ping間隔[ms](default15000)` \
            --socket.pong_wait_ms 15000 `# pong応答待ち[ms](default25000)` \
            --socket.write_wait_ms 5000 `# 書込み待ち[ms](default10000)` \
            --shutdown_grace_sec 5 `# シャットダウン猶予[秒](default0)` \
            --metrics.prometheus_port 9100 `# Prometheusポート[番号]` \
            --runtime.env NAKAMA_VERSION=3.35.0 \
            --match.input_queue_size 8192 `# tick毎メッセージキュー[件](default128)` \
            --socket.outgoing_queue_size 2048 `# 接続毎送信バッファ[件](default64)` \
            --socket.max_request_size_bytes 131072 `# 受信メッセージ上限[bytes](default131072)` \
            --runtime.max_count 8192 `# RPC同時goroutine上限[個](default256)` \
            --match.max_empty_sec 30 `# 空マッチ自動削除[秒](default0)` \
            --runtime.env MAX_LOGIN_RATE_PER_SEC=50 `# ログイン制限[人/秒]`
    restart: "no"
    stop_grace_period: 10s # SIGTERM後の猶予時間
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./:/nakama/data # Go plugin(.so)とLuaモジュール
    expose:
      - "6060" # pprof
      - "7349" # gRPC API
      - "7350" # HTTP API / WebSocket
      - "7351" # Console(管理画面)
      - "9100" # Prometheus metrics
    healthcheck:
      test: ["CMD", "/nakama/nakama", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Web フロントエンド配信 ---
  web:
    image: nginx:alpine
    restart: "no"
    volumes:
      - ../dist:/usr/share/nginx/html:ro # ビルド済み静的ファイル
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  # --- Prometheus メトリクス収集 ---
  prometheus:
    image: prom/prometheus
    entrypoint: /bin/sh -c
    command: |
      'sh -s <<EOF
        cat > ./prometheus.yml <<EON
      global:
        scrape_interval:     15s
        evaluation_interval: 15s

      scrape_configs:
        - job_name: prometheus
          static_configs:
          - targets: ['localhost:9090']

        - job_name: nakama
          metrics_path: /
          static_configs:
          - targets: ['nakama:9100']
      EON
      prometheus --config.file=./prometheus.yml
      EOF'

volumes:
  data: # PostgreSQL データ永続化ボリューム
