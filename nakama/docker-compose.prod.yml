# 本番環境オーバーライド
#
# 使い方:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# 同一 VPS に複数環境（prod + staging 等）を並列運用する場合は、
# nakama/.env で COMPOSE_PROJECT_NAME とポート番号を上書きする（doc/40 §4.3 参照）:
#   COMPOSE_PROJECT_NAME=tommchat-test
#   POSTGRES_PORT=5433
#   NAKAMA_PPROF_PORT=6160
#   NAKAMA_GRPC_PORT=7449
#   NAKAMA_API_PORT=7450
#   NAKAMA_CONSOLE_PORT=7451
#   WEB_PORT=8082
#   PROMETHEUS_PORT=9091
#   MINIO_S3_PORT=9002
#   MINIO_CONSOLE_PORT=9003
#
name: ${COMPOSE_PROJECT_NAME:-tommchat-prod}
# 開発用の docker-compose.yml を変更せずに、本番向けの設定を上書きします。
# - ポートを 127.0.0.1 バインド（nginx 以外は外部非公開）
# - restart: unless-stopped（自動再起動）
# - Nakama セキュリティ設定（.env から読み込み）
# - PostgreSQL ボリュームを dev と分離（パスワード競合防止）
services:
  postgres:
    restart: unless-stopped
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./data/postgres-prod:/var/lib/postgresql/data # 本番用（dev とは別ディレクトリ）
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  nakama:
    restart: unless-stopped
    # base の nakama.depends_on は postgres のみで minio を含まないので
    # MinIO 停止 (profiles 化) しても depends_on の上書きは不要。
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    ports:
      - "127.0.0.1:${NAKAMA_PPROF_PORT:-6060}:6060"
      - "127.0.0.1:${NAKAMA_GRPC_PORT:-7349}:7349"
      - "127.0.0.1:${NAKAMA_API_PORT:-7350}:7350"
      - "127.0.0.1:${NAKAMA_CONSOLE_PORT:-7351}:7351"
    # 秘密情報は argv に露出させないため entrypoint で一時 YAML に書き出し --config で渡す。
    # $$ はホスト側 compose 変数展開を抑止し、コンテナ内シェルで env から展開させるためのエスケープ。
    # env_file は base (docker-compose.yml) 側で設定済み。
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - |
          umask 077
          cat > /tmp/nakama-secrets.yml <<EOF
          database:
            address:
              - "nakama:$${POSTGRES_PASSWORD:-localdev}@postgres:5432/nakama"
          socket:
            server_key: "$${NAKAMA_SERVER_KEY:-tommie-chat}"
          console:
            username: "$${NAKAMA_CONSOLE_USER:-admin}"
            password: "$${NAKAMA_CONSOLE_PASS:-password}"
          EOF
          /nakama/nakama migrate up --config /tmp/nakama-secrets.yml \
          && exec /nakama/nakama --config /tmp/nakama-secrets.yml \
            --name nakama1 \
            --logger.level INFO \
            --session.token_expiry_sec 7200 \
            --socket.ping_period_ms 10000 \
            --socket.pong_wait_ms 15000 \
            --socket.write_wait_ms 5000 \
            --shutdown_grace_sec 5 \
            --metrics.prometheus_port 9100 \
            --runtime.env NAKAMA_VERSION=3.35.0 \
            --match.input_queue_size 8192 \
            --socket.outgoing_queue_size 2048 \
            --socket.max_request_size_bytes 131072 \
            --runtime.max_count 8192 \
            --match.max_empty_sec 30 \
            --runtime.env MAX_LOGIN_RATE_PER_SEC=50 \
            --runtime.env RATE_LIMIT_RPC=10 \
            --runtime.env RATE_LIMIT_RPC_BURST=20 \
            --runtime.env MINIO_ENDPOINT=minio:9000 \
            --runtime.env MINIO_USE_SSL=false \
            --runtime.env MAX_DISPLAY_NAME_LEN=30 \
            --runtime.env MAX_TEXTURE_URL_LEN=128 \
            --runtime.env MAX_ARRAY_SIZE=100 \
            --runtime.env ENABLE_TEST_RPC=false
            # 以下は env_file 経由で Go plugin が os.Getenv() から取得（argv 露出回避）:
            #   ADMIN_UIDS / ADMIN_EMAILS / GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET

  web:
    restart: unless-stopped
    # MinIO を本番停止 (profiles 化) するため、minio 依存を外す。
    # `!override` で base の depends_on を完全置換（merge ではなく replace）。
    depends_on: !override
      nakama:
        condition: service_healthy
    ports:
      - "127.0.0.1:${WEB_PORT:-8081}:80"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  prometheus:
    # 本番ではデフォルト起動から外す (メモリ削減、~100 MB)。doc/23-メモリ削減計画.md §Tier1 A
    # Nakama 自身の /metrics (port 9100) は --metrics.prometheus_port で維持されているので、
    # 必要時は外部から `curl http://127.0.0.1:9100/metrics` で取得可能。
    # それでも Prometheus サーバが要る局面では:
    #   docker compose -f docker-compose.yml -f docker-compose.prod.yml \
    #     --profile with-metrics up -d prometheus
    profiles: ["with-metrics"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  minio:
    # 本番ではデフォルト起動から外す (試験的、メモリ削減 ~80 MB)。
    # doc/23-メモリ削減計画.md §Tier1 B 参照。
    # 影響: /s3/avatars/<UID>.png (ユーザがアップロードしたカスタムアバター) が 502 になる。
    #       既定アバター /avatars/* は public 経由で配信継続なので影響なし。
    # 復活させる場合: 下行の profiles をコメントアウト or
    #   docker compose ... --profile with-minio up -d minio
    profiles: ["with-minio"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MINIO_S3_PORT:-9000}:9000"          # S3 API（内部のみ）
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"     # Web管理コンソール（内部のみ）
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

# volumes は Bind mount（./data/）を使用するため定義不要
