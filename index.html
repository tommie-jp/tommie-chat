<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>24-mmo-Tommie-chat</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87ceeb; }
        canvas { width: 100vw; height: 100vh; display: block; touch-action: none; }
        
        #chat-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 700px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }
        #chatInput {
            flex-grow: 1;
            height: 60px;
            font-size: 18px;
            padding: 10px;
            border-radius: 8px;
            border: 2px solid #555;
            background: rgba(255, 255, 255, 0.9);
            resize: none;
        }
        .ui-btn {
            width: 100px;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }
        #sendBtn { background: #0078d7; }
        #clearBtn { background: #d70000; }
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>
    
    <div id="chat-container">
        <textarea id="chatInput" placeholder="セリフを入力してEnterで送信..."></textarea>
        <button id="sendBtn" class="ui-btn">送信</button>
        <button id="clearBtn" class="ui-btn">クリア</button>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
